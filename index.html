<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>GasDrive V7</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a; 
      color: #fff; 
      overflow-x: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header h1 { font-size: 28px; margin-bottom: 5px; }
    .header p { font-size: 12px; opacity: 0.9; }
    .coins {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #FFD700;
      color: #000;
      padding: 5px 12px;
      border-radius: 20px;
      font-weight: bold;
    }
    
    .nav {
      display: flex;
      background: #1a1a1a;
      position: fixed;
      bottom: 0;
      width: 100%;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      padding: 12px 8px;
      background: none;
      border: none;
      color: #666;
      font-size: 11px;
      text-align: center;
    }
    .nav-btn.active { color: #667eea; }
    
    .tab-content { display: none; padding: 20px; padding-bottom: 80px; }
    .tab-content.active { display: block; }
    
    .sub-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 10px;
    }
    .sub-tab-btn {
      padding: 10px 16px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      color: #fff;
      white-space: nowrap;
      font-size: 14px;
    }
    .sub-tab-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: #667eea;
    }
    .sub-content { display: none; }
    .sub-content.active { display: block; }
    
    .pregunta {
      font-size: 18px;
      margin: 20px 0;
      line-height: 1.4;
    }
    .opciones {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }
    .opcion {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      transition: all 0.2s;
    }
    .opcion.correcta {
      background: #0f5;
      border-color: #0f5;
      color: #000;
    }
    .opcion.incorrecta {
      background: #f33;
      border-color: #f33;
    }
    .opcion.bloqueada { pointer-events: none; opacity: 0.7; }
    
    .feedback {
      padding: 16px;
      border-radius: 12px;
      margin: 16px 0;
      font-weight: bold;
      text-align: center;
      display: none;
    }
    .feedback.acierto { background: #0f5; color: #000; display: block; }
    .feedback.fallo { background: #f33; display: block; }
    
    .btn-siguiente {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      margin-top: 20px;
    }
    .btn-siguiente:disabled {
      opacity: 0.3;
      pointer-events: none;
    }
    
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #333;
      border-radius: 3px;
      overflow: hidden;
      margin: 12px 0;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s;
    }
    
    .garage-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    .garage-car {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .garage-car.locked { opacity: 0.4; }
    
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .emoji-item {
      background: #1a1a1a;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .emoji-item.owned { border-color: #0f5; }
    .emoji-big { font-size: 40px; margin-bottom: 8px; }
    
    .tip {
      background: #1a1a1a;
      border-left: 4px solid #667eea;
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .tip-emoji { font-size: 32px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>GASDRIVE V7 🚗</h1>
    <p>180 Preguntas DGT 2026. Offline. Gratis</p>
    <div class="coins" id="coins">💰 0</div>
  </div>

  <!-- TAB TEST -->
  <div id="tab-test" class="tab-content active">
    <div class="sub-tabs">
      <button class="sub-tab-btn active" onclick="cambiarSubTab('test', 'general')">📋 General</button>
      <button class="sub-tab-btn" onclick="cambiarSubTab('test', 'señales')">🚦 Señales</button>
      <button class="sub-tab-btn" onclick="cambiarSubTab('test', 'normas')">📖 Normas</button>
      <button class="sub-tab-btn" onclick="cambiarSubTab('test', 'mecanica')">🔧 Mecánica</button>
    </div>

    <div id="test-general" class="sub-content active">
      <h3>📋 TEST GENERAL</h3>

      <div>Score: <span id="test-general-score">0</span></div>
      <div class="progress-bar"><div id="test-general-progress" class="progress-fill"></div></div>
      <div id="test-general-pregunta" class="pregunta"></div>

      <div id="test-general-feedback" class="feedback"></div>
      <button id="btn-sig-test-general" onclick="siguienteTest('general')" disabled class="btn-siguiente">SIGUIENTE</button>
    </div>

      <div>Score: <span id="test-señales-score">0</span></div>
      <div class="progress-bar"><div id="test-señales-progress" class="progress-fill"></div></div>
      <div id="test-señales-pregunta" class="pregunta"></div>
      <div id="test-señales-opciones" class="opciones"></div>
      <div id="test-señales-feedback" class="feedback"></div>
      <button id="btn-sig-test-señales" onclick="siguienteTest('señales')" disabled class="btn-siguiente">SIGUIENTE</button>
    </div>

    <div id="test-normas" class="sub-content">
      <h3>📖 NORMAS</h3>
      <div>Aciertos: <span id="test-normas-aciertos">0</span> | Racha: <span id="test-normas-racha">0</span></div>
      <div>Score: <span id="test-normas-score">0</span></div>
      <div class="progress-bar"><div id="test-normas-progress" class="progress-fill"></div></div>
      <div id="test-normas-pregunta" class="pregunta"></div>
      <div id="test-normas-opciones" class="opciones"></div>
      <div id="test-normas-feedback" class="feedback"></div>
      <button id="btn-sig-test-normas" onclick="siguienteTest('normas')" disabled class="btn-siguiente">SIGUIENTE</button>
    </div>

    <div id="test-mecanica" class="sub-content">
      <h3>🔧 MECÁNICA</h3>
      <div>Aciertos: <span id="test-mecanica-aciertos">0</span> | Racha: <span id="test-mecanica-racha">0</span></div>
      <div>Score: <span id="test-mecanica-score">0</span></div>
      <div class="progress-bar"><div id="test-mecanica-progress" class="progress-fill"></div></div>
      <div id="test-mecanica-pregunta" class="pregunta"></div>
      <div id="test-mecanica-opciones" class="opciones"></div>
      <div id="test-mecanica-feedback" class="feedback"></div>
      <button id="btn-sig-test-mecanica" onclick="siguienteTest('mecanica')" disabled class="btn-siguiente">SIGUIENTE</button>
    </div>
  </div>

  <!-- TAB SITUACIONES -->
  <div id="tab-situaciones" class="tab-content">
    <div class="sub-tabs">
      <button class="sub-tab-btn active" onclick="cambiarSubTab('sit', 'clima')">🌧️ Clima</button>
      <button class="sub-tab-btn" onclick="cambiarSubTab('sit', 'ciudad')">🏙️ Ciudad</button>
      <button class="sub-tab-btn" onclick="cambiarSubTab('sit', 'carretera')">🛣️ Carretera</button>
      <button class="sub-tab-btn" onclick="cambiarSubTab('sit', 'emergencia')">🚨 Emergencia</button>
    </div>

    <div id="sit-clima" class="sub-content active">
      <h3>🌧️ CLIMA ADVERSO</h3>
      <div>Resueltas: <span id="sit-clima-aciertos">0</span>/10</div>
      <div>Score: <span id="sit-clima-score">0</span></div>
      <div class="progress-bar"><div id="sit-clima-progress" class="progress-fill"></div></div>
      <div id="sit-clima-pregunta" class="pregunta"></div>
      <div id="sit-clima-opciones" class="opciones"></div>
      <div id="sit-clima-feedback" class="feedback"></div>
      <button id="btn-sig-sit-clima" onclick="
